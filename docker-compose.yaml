#version: '3.8'

services:
  db:
    image:  postgres:15
    container_name: postgres_db
    restart: always

    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PWD}
      POSTGRES_DB: ${DB_NAME}

    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  app:
    build: .
    env_file:
      - .env
    container_name: fastapi_app
    ports:
      - "${APP_PORT}:8000"
    environment:
      - DATABASE_URL= "${DATABASE_URL_DOCKER}"
    depends_on:
      - db

volumes:
    postgres_data:

    
